services:
  - type: web
    name: telegram-subscription-bot
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: live
      - key: PAYPAL_PLAN_ID
        sync: false
      - key: SUBSCRIPTION_PRICE
        value: "9.99"
      - key: SUBSCRIPTION_CURRENCY
        value: USD
      - key: TRIAL_DAYS
        value: "15"
      - key: WEBHOOK_DOMAIN
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: DB_PATH
        value: ./data/subscriptions.db
    disk:
      name: bot-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
